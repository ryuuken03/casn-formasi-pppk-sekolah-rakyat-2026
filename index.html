<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eksplorasi Data CASN 2026 - Visualisasi Alternatif PPPK Guru & Teknis Sekolah Rakyat</title>
  <script>
    // Prevent flash of wrong theme
    (function() {
      var t = localStorage.getItem('sscasn-theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
